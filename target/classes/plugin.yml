main: com.simc.SiMCUniverse
version: 1.0.3-dev
name: SiMCUniverse
author: YunHydrogen
api-version: 1.20
description: SiMCUniverse 是一个 Minecraft 服务器插件，提供多种功能模块，如击杀分、存活分、抽奖（仿BA）、任务系统、签到系统等，原用于 RisingLight 和 惠州一中智能信息社MC服务器线上活动，现开源供社区使用和二次开发。
prefix: SiMCUniverse
commands:
  simcuniverse:
    description: SiMCUniverse 主命令。
    usage: /<command> sudo <help|list|disable|enable|reload|version>
    aliases: [simc]
    permission: simc.admin
  si-killscore:
    description: KillScore module command.
    usage: /<command> help
  si-livescore:
    description: LiveScore module command.
    usage: /<command> help
  si-shop:
    description: Shop module command.
    usage: /<command>
  si-random:
    description: Random module command.
    usage: /<command>
  si-checkin:
    description: Checkin module command.
    usage: /<command>
  si-task:
    description: Task module command.
    usage: /<command>
  si-protection:
    description: Protection module command.
    usage: /<command>
  si-quickenhance:
    description: Quickenhance module command.
    usage: /<command>
permissions:
  simc.admin:
    description: Allows managing SiMCUniverse.
    default: op
  simc.killscore.sudo:
    description: Allows using si-killscore sudo commands.
    default: op
  simc.livescore.sudo:
    description: Allows using si-livescore sudo commands.
    default: op
  simc.shop.sudo:
    description: Allows using si-shop sudo commands.
    default: op
  simc.random.sudo:
    description: Allows using si-random sudo commands.
    default: op
  simc.checkin.sudo:
    description: Allows using si-checkin sudo commands.
    default: op
  simc.task.sudo:
    description: Allows using si-task sudo commands.
    default: op
  simc.protection.sudo:
    description: Allows using si-protection sudo commands.
    default: op
  simc.quickenhance.sudo:
    description: Allows using si-quickenhance sudo commands.
    default: op