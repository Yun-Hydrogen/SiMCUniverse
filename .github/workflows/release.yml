name: Build and Release
run-name: >-
  Release • ${{ github.event_name == 'push' && 'preview' || inputs.release_type }} • ${{ github.ref_name }} • ${{ github.sha }}

on:
  push:
    branches:
      - '**'
  workflow_dispatch:
    inputs:
      release_type:
        description: 发布类型（preview，release）
        required: true
        default: preview
        type: choice
        options:
          - preview
          - release
      tag_name:
        description: 自定义 tag
        required: false
        type: string

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Build with Maven
        run: mvn -B -ntp clean package

      - name: Prepare release metadata
        id: meta
        shell: bash
        run: |
          COMMIT_SHA="$(git rev-parse --short HEAD)"
          COMMIT_MSG="$(git log -1 --pretty=%s)"
          COMMIT_BODY="$(git log -1 --pretty=%b)"
          AUTHOR="$(git log -1 --pretty='%an <%ae>')"
          NOW="$(date -u +'%Y%m%d-%H%M%S')"

          if [[ "${{ github.event_name }}" == "push" ]]; then
            RELEASE_TYPE="preview"
          else
            RELEASE_TYPE="${{ inputs.release_type }}"
          fi

          if [[ "$RELEASE_TYPE" == "preview" ]]; then
            TAG="preview-${NOW}-${COMMIT_SHA}"
            PRERELEASE="true"
            NAME="Preview ${NOW} (${COMMIT_SHA})"
          else
            INPUT_TAG="${{ inputs.tag_name }}"
            if [[ -n "$INPUT_TAG" ]]; then
              TAG="$INPUT_TAG"
            else
              TAG="v${NOW}-${COMMIT_SHA}"
            fi
            PRERELEASE="false"
            NAME="Release ${TAG}"
          fi

          {
            echo "tag=$TAG"
            echo "name=$NAME"
            echo "prerelease=$PRERELEASE"
            echo "release_type=$RELEASE_TYPE"
            echo "commit_sha=$COMMIT_SHA"
            echo "author=$AUTHOR"
            echo "commit_msg<<EOF"
            echo "$COMMIT_MSG"
            echo "EOF"
            echo "commit_body<<EOF"
            echo "$COMMIT_BODY"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          name: ${{ steps.meta.outputs.name }}
          prerelease: ${{ steps.meta.outputs.prerelease }}
          generate_release_notes: false
          fail_on_unmatched_files: true
          body: |
            Release type: ${{ steps.meta.outputs.release_type }}
            Commit: ${{ steps.meta.outputs.commit_sha }}
            Author: ${{ steps.meta.outputs.author }}

            Commit message:
            ${{ steps.meta.outputs.commit_msg }}

            ${{ steps.meta.outputs.commit_body }}
          files: |
            target/*.jar
